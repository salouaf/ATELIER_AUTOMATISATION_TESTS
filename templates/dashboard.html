
<!DOCTYPE html>
<html>
<head>
    <title>Dashboard API Tests</title>
    <link rel="stylesheet" 
        href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        td, th { text-align: center; padding: 8px; }
        .PASS { background-color: #c8e6c9; }   /* vert clair */
        .FAIL { background-color: #ffcccb; }   /* rouge clair */
    </style>
</head>
<body>
    <h1>Dashboard API Tests</h1>

    <table id="tests-table" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>Timestamp</th>
                <th>Passed</th>
                <th>Failed</th>
                <th>Avg Latency (ms)</th>
            </tr>
        </thead>
        <tbody>
            {% for r in runs %}
            <tr class="{{ 'PASS' if r[3]==0 else 'FAIL' }}">
                <td>{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td>{{ r[2] }}</td>
                <td>{{ r[3] }}</td>
                <td>{{ r[4]|round(2) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        $(document).ready( function () {
            $('#tests-table').DataTable({
                "order": [[0, "desc"]],
                "pageLength": 10
            });
        });
    </script>

</body>
</html>
