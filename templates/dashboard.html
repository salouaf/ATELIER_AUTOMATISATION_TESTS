<!DOCTYPE html>
<html>
<head>
    <title>Dashboard API Tests</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(to bottom, #0d1117, #161b22);
            color: #c9d1d9;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0; padding: 0;
        }
        h1 { margin: 20px 0; }
        #chart-container { width: 90%; margin: auto; height: 400px; }
        #run-tests-btn {
            display: block; margin: 20px auto; padding: 10px 20px;
            font-size: 16px; cursor: pointer; background: #238636; color: white; border: none; border-radius: 5px;
        }
        #last-image { display: block; margin: 20px auto; max-width: 300px; border-radius: 12px; }
    </style>
</head>
<body>
    <h1>Dashboard API Tests - Foodish</h1>

    <button id="run-tests-btn">Lancer les tests</button>

    <img id="last-image" src="{{ last_image }}" alt="Plat du dernier test">

    <div id="chart-container">
        <canvas id="testsChart"></canvas>
    </div>

    <script>
        // Bouton lancer les tests
        document.getElementById('run-tests-btn').onclick = function() {
            this.disabled = true; this.textContent = 'Tests en cours...';
            fetch('/run-tests')
                .then(r => r.json())
                .then(data => { 
                    alert(`Tests terminés : ${data.summary.passed} passés, ${data.summary.failed} échoués`);
                    location.reload(); 
                })
                .catch(e => { alert('Erreur'); console.error(e); this.disabled=false; this.textContent='Lancer les tests'; });
        }

        // Chart.js graphique animé simple
        const ctx = document.getElementById('testsChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [{% for r in runs %}"{{ r[1] }}",{% endfor %}],
                datasets: [{
                    label: 'Passed',
                    data: [{% for r in runs %}{{ r[2] }},{% endfor %}],
                    borderColor: '#38b000',
                    backgroundColor: 'rgba(56,176,0,0.3)',
                    fill: true,
                    tension: 0.4
                },{
                    label: 'Failed',
                    data: [{% for r in runs %}{{ r[3] }},{% endfor %}],
                    borderColor: '#ff4d6d',
                    backgroundColor: 'rgba(255,77,109,0.3)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { labels: { color: 'white' } } },
                scales: {
                    x: { ticks: { color: 'white' }, grid: { color: '#30363d' } },
                    y: { ticks: { color: 'white' }, grid: { color: '#30363d' } }
                },
                animation: { duration: 1000 }
            }
        });
    </script>
</body>
</html>
