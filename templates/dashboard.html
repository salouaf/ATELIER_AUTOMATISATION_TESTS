<!DOCTYPE html>
<html>
<head>
    <title>Dashboard API Tests</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" 
        href="https://cdn.datatables.net/1.13.5/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td, th { text-align: center; padding: 8px; }
        .PASS { background-color: #c8e6c9; font-weight: bold; }
        .FAIL { background-color: #ffcccb; font-weight: bold; }
        #run-tests-btn { margin-bottom: 20px; padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #chart-container { width: 80%; margin: auto; margin-top: 40px; }
        #last-image { display: block; margin: 20px auto; max-width: 400px; border-radius: 12px; }
    </style>
</head>
<body>
    <h1>Dashboard API Tests</h1>

    <!-- Bouton pour lancer les tests -->
    <button id="run-tests-btn">Lancer les tests</button>

    <!-- Graphique -->
    <div id="chart-container">
        <canvas id="testsChart"></canvas>
    </div>

    <!-- Dernière image du plat -->
    <img id="last-image" src="{{ last_image }}" alt="Plat du dernier test">

    <!-- Tableau -->
    <table id="tests-table" class="display">
        <thead>
            <tr>
                <th>ID</th>
                <th>Timestamp</th>
                <th>Passed</th>
                <th>Failed</th>
                <th>Avg Latency (ms)</th>
            </tr>
        </thead>
        <tbody>
            {% for r in runs %}
            <tr class="{{ 'PASS' if r[3]==0 else 'FAIL' }}">
                <td>{{ r[0] }}</td>
                <td>{{ r[1] }}</td>
                <td>{{ r[2] }}</td>
                <td>{{ r[3] }}</td>
                <td>{{ r[4]|round(2) }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        $(document).ready( function () {
            $('#tests-table').DataTable({"order": [[0, "desc"]], "pageLength": 10});

            // Bouton Lancer les tests
            $('#run-tests-btn').click(function() {
                $(this).prop('disabled', true).text('Tests en cours...');
                fetch('/run-tests')
                    .then(response => response.json())
                    .then(data => {
                        alert(`Tests terminés : ${data.summary.passed} passés, ${data.summary.failed} échoués`);
                        location.reload();
                    })
                    .catch(err => {
                        alert('Erreur lors de l\'exécution des tests');
                        console.error(err);
                        $(this).prop('disabled', false).text('Lancer les tests');
                    });
            });

            // --- Graphique Chart.js ---
            const ctx = document.getElementById('testsChart').getContext('2d');
            const chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: [{% for r in runs %}"{{ r[0] }}",{% endfor %}],
                    datasets: [{
                        label: 'Passed',
                        data: [{% for r in runs %}{{ r[2] }},{% endfor %}],
                        backgroundColor: 'rgba(75, 192, 192, 0.7)'
                    },{
                        label: 'Failed',
                        data: [{% for r in runs %}{{ r[3] }},{% endfor %}],
                        backgroundColor: 'rgba(255, 99, 132, 0.7)'
                    }]
                },
                options: {
                    responsive: true,
                    animation: { duration: 1000 },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        });
    </script>

</body>
</html>
